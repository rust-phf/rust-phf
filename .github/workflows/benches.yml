name: Bench
on:
  pull_request:
    types: [labeled]

permissions:
  deployments: write
  contents: write

jobs:
  bench_between_main_and_pr:
    if: ${{ github.event.label.name == 'run-benchmarks' }}
    name: Bench
    runs-on: ubuntu-latest
    steps:
      - name: Setup nightly toolchain
        run: |
          rustup set profile minimal
          rustup override set nightly
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run benchmark on PR
        run: cargo bench | tee output.txt
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1.21.0
        with:
          tool: 'cargo'
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-always: true
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: true
